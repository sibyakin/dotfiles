include=/usr/share/foot/themes/xterm
term=xterm-256color
font=Cousine Nerd Font:size=14,Noto Color Emoji:size=14
initial-window-size-chars=150x48
workers=1
pad=3x3

[scrollback]
lines=65000

[csd]
size=35
color=303030
border-width=3
button-width=40
button-color=eeeeee
button-minimize-color=404040
button-maximize-color=404040
button-close-color=404040
hide-when-maximized=yes

[bell]
system=no

[key-bindings]
fullscreen=Control+Shift+f
